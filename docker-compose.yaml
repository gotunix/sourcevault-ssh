services:
  tailscale-sourcevault_ssh:
    image: tailscale/tailscale:latest
    container_name: ts-sourcevault_ssh
    hostname: gitssh
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-sourcevault_ssh:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  sourcevault_ssh:
    build: 
      context: ./
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-401}
        PGID: ${PGID:-401}
    image: sourcevault_ssh:latest
    network_mode: service:tailscale-sourcevault_ssh
    environment:
      - GIT_SHELL_LOG_PATH=/var/log/git/ssh.log
      - GIT_SHELL_REPO_ROOT=/data/git
    volumes:
      - git-data:/data/git
      - ssh-config:/etc/ssh
      - ./logs:/var/log/git

volumes:
  ts-sourcevault_ssh:
    driver: local
  ssh-config:
    driver: local
  git-data:
    driver_opts:
      type: nfs
      # IP format -> Custom NFS target locally mapping explicitly gracefully cleanly smoothly completely rationally ideally automatically
      o: addr=172.16.0.4,rw
      # Host folder -> Custom NFS path
      device: ":/volume1/repositories"
